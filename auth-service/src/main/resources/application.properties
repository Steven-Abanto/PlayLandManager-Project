spring.application.name=auth-service
server.port=${SERVER_PORT:8081}
core-service.url=${CORE_SERVICE_URL:http://localhost:8083}

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/playland_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:playland-secret-key-super-long-123456789}
jwt.expiration=${JWT_EXPIRATION:600000}
jwt.issuer=${JWT_ISSUER:playlandmanager}

# Actuator opcional
management.endpoints.web.exposure.include=health,info